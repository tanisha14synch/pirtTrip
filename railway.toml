# DEPRECATED for single-service deploy from repo root.
# Use TWO Railway services instead:
#   • backend/  → healthcheck /api/health  (see backend/railway.toml)
#   • frontend/ → healthcheck /            (see frontend/railway.toml)
#
# If you still deploy API from repo root, this builds backend/Dockerfile:

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node .output/server/index.mjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
