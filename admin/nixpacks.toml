# Railway Nixpacks build (Root Directory must be "admin")
# Use when Dockerfile path is misconfigured — builder: NIXPACKS in admin/railway.json

[variables]
NODE_VERSION = "22"
NIXPACKS_NODE_VERSION = "22"
HOST = "0.0.0.0"
NITRO_HOST = "0.0.0.0"
API_URL = "https://api.pirttrip.com"

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["NODE_OPTIONS=--max-old-space-size=4096 npm run build"]

[start]
cmd = "sh start.sh"
